server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

spring:
  application:
    name: Finance Backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:oracle:thin:@//localhost:1521/ORCLPDB}
    username: ${SPRING_DATASOURCE_USERNAME:C##kunal}
    password: ${SPRING_DATASOURCE_PASSWORD:kunal123}
    driver-class-name: oracle.jdbc.OracleDriver

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect

logging:
  level:
    root: INFO
    com.zorvyn.finance: DEBUG

app:
  jwt:
    secret: ${APP_JWT_SECRET:your-super-secret-key-1234567890123456}
    expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info