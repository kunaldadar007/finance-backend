version: '3.8'

services:
  finance-backend:
    build: .
    container_name: finance-backend-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@oracle-db:1521:XE
      SPRING_DATASOURCE_USERNAME: system
      SPRING_DATASOURCE_PASSWORD: oracle
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: false
      APP_JWT_SECRET: your-super-secret-key-must-be-at-least-32-characters-long
      APP_JWT_EXPIRATION: 86400000
    depends_on:
      - oracle-db
    networks:
      - finance-network
    restart: unless-stopped

  oracle-db:
    image: gvenzl/oracle-xe:latest
    container_name: finance-oracle-db
    environment:
      ORACLE_PASSWORD: oracle
    ports:
      - "2521:1521"
    networks:
      - finance-network
    restart: unless-stopped

networks:
  finance-network:
    driver: bridge
